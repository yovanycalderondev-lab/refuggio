<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Refugio — Tu espacio seguro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ══ VARIABLES ══ */
:root{
  --bg:#FFF8E7;--surf:#FFFDF6;--card:#FFFFFF;--inp:#FEFCF4;--sb:#F5F3EA;
  --pri:#C4A882;--acc:#FADADD;--grn:#B5D5B7;--rose:#E8C4C4;
  --t1:#3D3530;--t2:#7A6E68;--tm:#B0A49E;--ton:#6B4F52;
  --bs:rgba(196,168,130,0.2);--bm:rgba(196,168,130,0.35);
  --sh:0 4px 20px rgba(100,70,50,.1);--shl:0 8px 40px rgba(100,70,50,.14);
  --r:16px;--rl:24px;--rx:32px;--rf:9999px;
  --sw:260px;--th:62px;--tr:all .25s cubic-bezier(.4,0,.2,1);
  --gold:#C4A832;--gold-bg:rgba(196,168,50,.12);
}
[data-theme=dark]{
  --bg:#2A2218;--surf:#302820;--card:#3A2E22;--inp:#342A1E;--sb:#251E16;
  --pri:#C4A882;--acc:#7A4D52;--grn:#3D6040;--rose:#6B4040;
  --t1:#F2E8D8;--t2:#C4B5A0;--tm:#8A7A6A;--ton:#F2D0D3;
  --bs:rgba(196,168,130,.12);--bm:rgba(196,168,130,.22);
  --sh:0 4px 20px rgba(0,0,0,.35);--shl:0 8px 40px rgba(0,0,0,.45);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'DM Sans',,-apple-system,sans-serif;background:var(--bg);color:var(--t1);line-height:1.6;min-height:100dvh;overflow:hidden;transition:background .4s,color .4s}
h1,h2,h3{font-family:'Playfair Display',Georgia,serif}
em{font-style:italic}
.hidden{display:none!important}

/* ══ AUTH SCREEN ══ */
.auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:1.5rem;z-index:2000;transition:background .4s}
.auth-card{background:var(--surf);border:1px solid var(--bs);border-radius:var(--rx);padding:3rem 2.5rem;max-width:420px;width:100%;text-align:center;box-shadow:var(--shl);animation:slideUp .5s ease}
.auth-logo{font-size:3rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
.auth-title{font-size:2.2rem;font-weight:500;margin-bottom:.5rem}
.auth-sub{color:var(--t2);font-size:.95rem;margin-bottom:2.5rem;line-height:1.7}
.google-btn{display:flex;align-items:center;justify-content:center;gap:.75rem;width:100%;background:#fff;color:#3C4043;border:1.5px solid #dadce0;border-radius:var(--rf);padding:.85rem 1.5rem;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;transition:var(--tr);margin-bottom:.75rem}
.google-btn:hover{background:#f8f9fa;box-shadow:0 1px 6px rgba(0,0,0,.12);transform:translateY(-1px)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
[data-theme=dark] .google-btn{background:#3A2E22;color:var(--t1);border-color:var(--bm)}
[data-theme=dark] .google-btn:hover{background:#443525}
.guest-btn{background:none;border:none;color:var(--tm);font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;padding:.5rem;text-decoration:underline;text-underline-offset:3px;transition:var(--tr)}
.guest-btn:hover{color:var(--t2)}
.auth-footer{margin-top:1.5rem;font-size:.75rem;color:var(--tm);line-height:1.6}

/* ... (El resto de tus clases de CSS se mantendrán intactas en el archivo) ... */
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🌿</div>
    <h1 class="auth-title"><em>Refugio</em></h1>
    <p class="auth-sub">Tu espacio seguro para descansar, reflexionar y sentirte acompañad@.</p>
    <button class="google-btn" id="google-btn">
      <svg viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>
    <button class="guest-btn" id="guest-btn">Entrar como invitado</button>
    <div class="auth-footer">Protección de datos garantizada. Al continuar, aceptas nuestras políticas de privacidad.</div>
  </div>
</div>

<!-- ══ CONTENIDO PRINCIPAL (App) ══ -->
<div id="app-container" class="app hidden">
  <!-- Aquí va toda la estructura de la barra lateral (sb) y el contenedor principal (main) -->
</div>

<!-- ══ SUPABASE CONFIG & INITIALIZATION ══ -->
<script>
  // Reemplaza con las credenciales de tu proyecto de Supabase
  const SUPABASE_URL = "https://nywnruzqyqkoobjwymvt.supabase.co"; 
  const SUPABASE_ANON_KEY = "TU_LLAVE_ANON_DE_SUPABASE_AQUÍ";

  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Elementos del DOM
  const authScreen = document.getElementById('auth-screen');
  const appContainer = document.getElementById('app-container');
  const googleBtn = document.getElementById('google-btn');
  const guestBtn = document.getElementById('guest-btn');

  // Controlar el inicio de sesión
  googleBtn.addEventListener('click', async () => {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        // Redirige al dominio limpio de Render
        redirectTo: 'https://refuggio.onrender.com/'
      }
    });
    if (error) console.error("Error al iniciar sesión:", error.message);
  });

  guestBtn.addEventListener('click', () => {
    // Modo invitado: Oculta pantalla de login y muestra la app
    authScreen.classList.add('hidden');
    appContainer.classList.remove('hidden');
  });

  // Escuchar el estado de autenticación globalmente
  supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
      // Si el usuario está autenticado, cargamos la aplicación de inmediato
      authScreen.classList.add('hidden');
      appContainer.classList.remove('hidden');
      console.log("Sesión iniciada con éxito para:", session.user.email);
    } else {
      // Si no hay sesión, obligamos a mostrar el formulario de login
      authScreen.classList.remove('hidden');
      appContainer.classList.add('hidden');
    }
  });
</script>

</body>
</html>
